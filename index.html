<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beltah VCF GAINS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container fade-in">
     <!-- Hero -->
    <header class="hero">
  <div class="logo-row">
    <img src="whatsapp-logo.png" alt="WhatsApp Logo" class="whatsapp-logo">
    <h1>Beltah VCF GAINS <span class="badge">✔ Verified</span></h1>
  </div>
  <p class="subtitle">Join the movement — 1,000 verified members</p>
</header>

    <!-- Registration Form -->
    <section class="form glass">
      <h2>Register</h2>
      <form onsubmit="registerUser(event)">
        <div class="name-group">
          <div class="input-wrapper">
            <input type="text" id="firstName" required>
            <label for="firstName">First Name</label>
          </div>
          <div class="input-wrapper">
            <input type="text" id="lastName" required>
            <label for="lastName">Last Name</label>
          </div>
        </div>

        <div class="phone-group">
          <span class="plus-sign">+</span>
          <div class="input-wrapper small">
            <input type="text" id="countryCode" required>
            <label for="countryCode">Code</label>
          </div>
          <div class="input-wrapper">
            <input type="text" id="phone" required>
            <label for="phone">Number (no 0)</label>
          </div>
        </div>

        <label class="recaptcha">
          <input type="checkbox" id="humanCheck" required>
          <span class="checkmark"></span> I am Human
        </label>

        <button type="submit" class="liquid-btn">Submit</button>
      </form>
      <div id="success"></div>
    </section>

    <footer>
      <p>&copy; 2026 Beltah VCF GAINS</p>
      <a href="admin.html" class="admin-btn">Admin Login</a>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
