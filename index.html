<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beltah VCF GAINS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Radar background -->
  <div id="radar-root"></div>

  <div class="container fade-in">
    <!-- Hero -->
    <header class="hero">
      <div class="logo-row">
        <img src="whatsapp-logo.png" alt="WhatsApp Logo" class="whatsapp-logo">
        <h1>Beltah VCF GAINS <span class="badge">✔ Verified</span></h1>
      </div>
      <p class="subtitle">Join the movement — 1,000 verified members</p>
    </header>

    <!-- Registration Card -->
    <section class="form glass">
      <h2>Register</h2>
      <form onsubmit="registerUser(event)">
        <!-- First Name -->
        <div class="input-wrapper">
          <input type="text" id="firstName" required placeholder=" ">
          <label for="firstName">First Name</label>
        </div>

        <!-- Last Name -->
        <div class="input-wrapper">
          <input type="text" id="lastName" required placeholder=" ">
          <label for="lastName">Last Name</label>
        </div>

        <!-- Country Code -->
        <div class="input-wrapper">
          <input type="text" id="countryCode" required placeholder=" ">
          <label for="countryCode">Country Code</label>
        </div>

        <!-- Phone Number -->
        <div class="input-wrapper">
          <input type="text" id="phone" required placeholder=" ">
          <label for="phone">Phone Number (no 0)</label>
        </div>

        <!-- Recaptcha -->
        <label class="recaptcha">
          <input type="checkbox" id="humanCheck" required>
          <span class="checkmark"></span> I am Human
        </label>

        <!-- Button row -->
        <div class="buttons">
          <button type="submit" class="liquid-btn">Submit</button>
          <button type="button" class="admin-btn" onclick="window.location.href='admin.html'">Admin Login</button>
        </div>
      </form>

      <!-- Success message -->
      <div id="success"></div>
    </section>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 Beltah VCF GAINS</p>
    </footer>
  </div>

  <script src="script.js"></script>
  <!-- Radar integration script -->
  <script type="module">
    import Radar from './Radar.js';
    import React from 'react';
    import ReactDOM from 'react-dom/client';

    const root = ReactDOM.createRoot(document.getElementById('radar-root'));
    root.render(
      <Radar
        speed={1}
        scale={0.5}
        ringCount={10}
        spokeCount={10}
        ringThickness={0.05}
        spokeThickness={0.01}
        sweepSpeed={1}
        sweepWidth={2}
        sweepLobes={1}
        color="#9f29ff"
        backgroundColor="#000000"
        falloff={2}
        brightness={1}
        enableMouseInteraction
        mouseInfluence={0.1}
      />
    );
  </script>
</body>
</html>
