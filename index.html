<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beltah VCF GAINS</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Babel for in-browser JSX translation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#0f172a] text-slate-100 font-sans selection:bg-cyan-500/30">
  <div id="root"></div>

  <!-- Using type="text/babel" and data-type="module" to compile JSX in the browser while supporting ES imports -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
    import { 
      getFirestore, collection, doc, setDoc, getDoc, onSnapshot, query 
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
    import { 
      getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken 
    } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
    import { 
      CheckCircle, Users, Globe, Download, Search, Lock, 
      ArrowRight, ShieldCheck, MessageCircle, X, MapPin, ChevronRight 
    } from 'https://esm.sh/lucide-react@0.344.0';

    // Safe fallbacks to prevent errors if running locally without injected environment variables
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? JSON.parse(__firebase_config) 
      : { apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: "" };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'vcf-gains-app';
    const TARGET_GOAL = 1000;

    const COUNTRIES = [
      { name: "Kenya", code: "+254", flag: "🇰🇪", region: "Africa" },
      { name: "Nigeria", code: "+234", flag: "🇳🇬", region: "Africa" },
      { name: "Ghana", code: "+233", flag: "🇬🇭", region: "Africa" },
      { name: "South Africa", code: "+27", flag: "🇿🇦", region: "Africa" },
      { name: "Tanzania", code: "+255", flag: "🇹🇿", region: "Africa" },
      { name: "Uganda", code: "+256", flag: "🇺🇬", region: "Africa" },
      { name: "USA", code: "+1", flag: "🇺🇸", region: "International" },
      { name: "UK", code: "+44", flag: "🇬🇧", region: "International" },
      { name: "Canada", code: "+1", flag: "🇨🇦", region: "International" },
      { name: "India", code: "+91", flag: "🇮🇳", region: "International" },
      { name: "Germany", code: "+49", flag: "🇩🇪", region: "International" },
      { name: "France", code: "+33", flag: "🇫🇷", region: "International" },
    ].sort((a, b) => a.name.localeCompare(b.name));

    function App() {
      const [user, setUser] = useState(null);
      const [members, setMembers] = useState([]);
      const [view, setView] = useState('landing');
      const [selectedRegion, setSelectedRegion] = useState(null);
      const [selectedCountry, setSelectedCountry] = useState(null);
      const [formData, setFormData] = useState({ fullName: '', whatsapp: '', isHuman: false });
      const [status, setStatus] = useState({ loading: false, error: '', success: false });
      const [searchTerm, setSearchTerm] = useState('');

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth Error:", err);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        
        const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
        const q = query(membersRef);
        
        const unsubscribe = onSnapshot(q, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setMembers(data);
        }, (err) => {
          console.error("Firestore Listen Error:", err);
        });

        return () => unsubscribe();
      }, [user]);

      const handleRegister = async (e) => {
        e.preventDefault();
        if (!formData.isHuman) {
          setStatus({ ...status, error: "Please verify you are human." });
          return;
        }

        setStatus({ ...status, loading: true, error: '' });
        const cleanWhatsApp = formData.whatsapp.replace(/\D/g, '');
        const fullPhoneNumber = `${selectedCountry.code}${cleanWhatsApp}`;

        try {
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'members', fullPhoneNumber);
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
            setStatus({ loading: false, error: "This number is already registered!", success: false });
            return;
          }

          await setDoc(docRef, {
            name: formData.fullName,
            phone: fullPhoneNumber,
            country: selectedCountry.name,
            timestamp: Date.now()
          });

          setStatus({ loading: false, error: '', success: true });
          setView('success');
        } catch (err) {
          setStatus({ loading: false, error: "Registration failed. Try again.", success: false });
        }
      };

      const downloadVCF = () => {
        if (members.length < TARGET_GOAL) return;

        let vcfContent = "";
        members.forEach(member => {
          vcfContent += `BEGIN:VCARD\nVERSION:3.0\nFN:${member.name} - VCF GAINS\nTEL;TYPE=CELL:${member.phone}\nEND:VCARD\n`;
        });

        const blob = new Blob([vcfContent], { type: 'text/vcard' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', 'Beltah_VCF_Gains_1000.vcf');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const filteredCountries = COUNTRIES.filter(c => 
        c.region === selectedRegion && 
        c.name.toLowerCase().includes(searchTerm.toLowerCase())
      );

      const ProgressStats = () => (
        <div className="w-full max-w-xl bg-white/5 border border-white/10 backdrop-blur-xl rounded-3xl p-6 mb-8 shadow-2xl">
          <div className="flex justify-between items-end mb-4">
            <div>
              <p className="text-gray-400 text-sm font-medium uppercase tracking-wider">Growth Status</p>
              <h2 className="text-3xl font-bold text-white">
                {members.length.toLocaleString()} <span className="text-cyan-400 text-lg">/ {TARGET_GOAL}</span>
              </h2>
            </div>
            <div className="text-right">
              <p className="text-gray-400 text-sm mb-1">Remaining</p>
              <p className="text-xl font-mono text-cyan-400">{Math.max(0, TARGET_GOAL - members.length)}</p>
            </div>
          </div>
          
          <div className="relative h-4 w-full bg-slate-800 rounded-full overflow-hidden border border-white/5">
            <div 
              className="absolute top-0 left-0 h-full bg-gradient-to-r from-blue-600 to-cyan-400 transition-all duration-1000 ease-out shadow-[0_0_15px_rgba(34,211,238,0.5)]"
              style={{ width: `${Math.min(100, (members.length / TARGET_GOAL) * 100)}%` }}
            />
          </div>
          
          <div className="mt-4 flex items-center gap-2 text-xs text-cyan-400/80 italic">
            <Users className="w-3.5 h-3.5" />
            <span>Real-time database sync active</span>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-[#0f172a] text-slate-100 font-sans flex flex-col justify-between">
          <div className="fixed inset-0 overflow-hidden pointer-events-none">
            <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px]" />
            <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-cyan-500/10 rounded-full blur-[120px]" />
          </div>

          <main className="relative z-10 container mx-auto px-4 py-8 flex flex-col items-center">
            <header className="w-full max-w-4xl flex justify-between items-center mb-12">
              <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('landing')}>
                <div className="w-10 h-10 bg-gradient-to-br from-blue-600 to-cyan-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
                  <ShieldCheck className="text-white w-6 h-6" />
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight">BELTAH VCF</h1>
                  <div className="flex items-center gap-1">
                    <div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse" />
                    <span className="text-[10px] uppercase tracking-widest text-slate-400 font-semibold">Verified Network</span>
                  </div>
                </div>
              </div>
              <button 
                onClick={() => setView('members')}
                className="px-4 py-2 rounded-full bg-white/5 border border-white/10 hover:bg-white/10 transition-colors text-sm font-medium flex items-center gap-2"
              >
                <Users className="w-4 h-4 text-cyan-400" />
                View Members
              </button>
            </header>

            {view === 'landing' && (
              <div className="flex flex-col items-center text-center max-w-2xl">
                <span className="px-3 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-bold tracking-widest uppercase mb-6">
                  Exclusive 1,000 Member Launch
                </span>
                <h2 className="text-5xl md:text-7xl font-extrabold mb-6 leading-tight">
                  Grow Your <span className="bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent">Audience</span> Instantly
                </h2>
                <p className="text-lg text-slate-400 mb-10 leading-relaxed max-w-lg">
                  Register your contact details to be part of the most verified VCF network in Africa. Gain massive WhatsApp views and engagement.
                </p>

                <ProgressStats />

                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-xl">
                  <button 
                    onClick={() => { setSelectedRegion('Africa'); setView('region'); }}
                    className="group relative overflow-hidden bg-white/5 border border-white/10 backdrop-blur-md p-8 rounded-3xl hover:border-blue-500/50 transition-all active:scale-[0.98]"
                  >
                    <div className="absolute inset-0 bg-gradient-to-br from-blue-600/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity" />
                    <Globe className="w-10 h-10 text-blue-500 mb-4" />
                    <h3 className="text-xl font-bold mb-1">Africa</h3>
                    <p className="text-sm text-slate-500 mb-4">Registration Open</p>
                    <div className="flex items-center text-blue-400 font-bold gap-2">
                      Join Now <ArrowRight className="w-4 h-4 group-hover:translate-x-1 transition-transform" />
                    </div>
                  </button>

                  <button 
                    onClick={() => { setSelectedRegion('International'); setView('region'); }}
                    className="group relative overflow-hidden bg-white/5 border border-white/10 backdrop-blur-md p-8 rounded-3xl hover:border-cyan-500/50 transition-all active:scale-[0.98]"
                  >
                    <div className="absolute inset-0 bg-gradient-to-br from-cyan-600/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity" />
                    <Globe className="w-10 h-10 text-cyan-500 mb-4" />
                    <h3 className="text-xl font-bold mb-1">International</h3>
                    <p className="text-sm text-slate-500 mb-4">Global Network</p>
                    <div className="flex items-center text-cyan-400 font-bold gap-2">
                      Join Now <ArrowRight className="w-4 h-4 group-hover:translate-x-1 transition-transform" />
                    </div>
                  </button>
                </div>

                <div className="mt-12 w-full max-w-xl">
                  <button 
                    disabled={members.length < TARGET_GOAL}
                    onClick={downloadVCF}
                    className={`w-full py-5 rounded-2xl flex items-center justify-center gap-3 font-bold transition-all shadow-xl shadow-cyan-900/20 ${
                      members.length >= TARGET_GOAL 
                      ? 'bg-gradient-to-r from-blue-600 to-cyan-500 hover:scale-[1.02] active:scale-[0.98]' 
                      : 'bg-slate-800 text-slate-500 border border-slate-700 cursor-not-allowed'
                    }`}
                  >
                    {members.length >= TARGET_GOAL ? (
                      <React.Fragment><Download className="w-6 h-6" /> Download 1,000 Contacts</React.Fragment>
                    ) : (
                      <React.Fragment><Lock className="w-5 h-5" /> Unlocks at 1,000 Members</React.Fragment>
                    )}
                  </button>
                </div>
              </div>
            )}

            {view === 'region' && (
              <div className="w-full max-w-xl">
                <button onClick={() => setView('landing')} className="flex items-center gap-2 text-slate-400 hover:text-white mb-6 transition-colors">
                  <ArrowRight className="w-4 h-4 rotate-180" /> Back to Home
                </button>
                <div className="bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-md">
                  <h2 className="text-3xl font-bold mb-2">Select Your Country</h2>
                  <p className="text-slate-400 mb-6">Showing available networks in {selectedRegion}</p>
                  
                  <div className="relative mb-6">
                    <Search className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-500" />
                    <input 
                      type="text" 
                      placeholder="Search your country..."
                      className="w-full bg-slate-900/50 border border-white/10 rounded-xl py-4 pl-12 pr-4 focus:ring-2 focus:ring-cyan-500/50 outline-none transition-all"
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                    />
                  </div>

                  <div className="space-y-2 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                    {filteredCountries.map(country => (
                      <button 
                        key={country.name}
                        onClick={() => { setSelectedCountry(country); setView('register'); }}
                        className="w-full flex items-center justify-between p-4 rounded-xl hover:bg-white/5 border border-transparent hover:border-white/10 transition-all text-left"
                      >
                        <div className="flex items-center gap-4">
                          <span className="text-2xl">{country.flag}</span>
                          <div>
                            <p className="font-bold">{country.name}</p>
                            <p className="text-xs text-slate-500">{country.code}</p>
                          </div>
                        </div>
                        <ChevronRight className="w-5 h-5 text-slate-600" />
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {view === 'register' && (
              <div className="w-full max-w-xl">
                <button onClick={() => setView('region')} className="flex items-center gap-2 text-slate-400 hover:text-white mb-6 transition-colors">
                  <ArrowRight className="w-4 h-4 rotate-180" /> Change Country
                </button>
                <div className="bg-white/5 border border-white/10 rounded-3xl p-8 backdrop-blur-md relative overflow-hidden">
                  <div className="absolute top-0 right-0 p-6 opacity-20">
                    <span className="text-6xl">{selectedCountry.flag}</span>
                  </div>
                  
                  <h2 className="text-3xl font-bold mb-2">Complete Verification</h2>
                  <p className="text-slate-400 mb-8">Registering for <span className="text-cyan-400 font-bold">{selectedCountry.name}</span> Network</p>

                  <form onSubmit={handleRegister} className="space-y-6">
                    <div>
                      <label className="block text-sm font-medium text-slate-400 mb-2">Full Name</label>
                      <input 
                        required
                        type="text" 
                        placeholder="Enter your name"
                        className="w-full bg-slate-900/50 border border-white/10 rounded-xl py-4 px-4 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all"
                        value={formData.fullName}
                        onChange={(e) => setFormData({...formData, fullName: e.target.value})}
                      />
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-slate-400 mb-2">WhatsApp Number</label>
                      <div className="flex gap-2">
                        <div className="bg-slate-800 border border-white/10 rounded-xl py-4 px-4 font-bold text-slate-300 flex items-center">
                          {selectedCountry.code}
                        </div>
                        <input 
                          required
                          type="tel" 
                          placeholder="712345678"
                          className="flex-1 bg-slate-900/50 border border-white/10 rounded-xl py-4 px-4 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all"
                          value={formData.whatsapp}
                          onChange={(e) => setFormData({...formData, whatsapp: e.target.value})}
                        />
                      </div>
                    </div>

                    <div 
                      className="flex items-center gap-3 p-4 bg-slate-800/50 rounded-xl border border-white/5 cursor-pointer hover:bg-slate-800 transition-colors"
                      onClick={() => setFormData({...formData, isHuman: !formData.isHuman})}
                    >
                      <div className={`w-6 h-6 rounded flex items-center justify-center border ${formData.isHuman ? 'bg-cyan-500 border-cyan-500' : 'border-slate-600'}`}>
                        {formData.isHuman && <CheckCircle className="w-4 h-4 text-white" />}
                      </div>
                      <span className="text-sm font-medium text-slate-300">I am human and agree to join the network.</span>
                    </div>

                    {status.error && (
                      <div className="p-4 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-sm font-medium animate-bounce">
                        {status.error}
                      </div>
                    )}

                    <button 
                      disabled={status.loading}
                      type="submit"
                      className="w-full bg-gradient-to-r from-blue-600 to-cyan-500 py-5 rounded-xl font-bold text-lg hover:scale-[1.01] active:scale-[0.99] transition-all disabled:opacity-50"
                    >
                      {status.loading ? 'Verifying...' : 'Submit Registration'}
                    </button>
                  </form>
                </div>
              </div>
            )}

            {view === 'success' && (
              <div className="w-full max-w-xl text-center">
                <div className="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-green-500/40">
                  <CheckCircle className="w-12 h-12 text-white" />
                </div>
                <h2 className="text-4xl font-extrabold mb-4">Registration Successful!</h2>
                <p className="text-slate-400 mb-10 text-lg">
                  You've been added to the <span className="text-cyan-400 font-bold">Beltah VCF GAINS</span> list. Your contact will be included in the final download file once we hit 1,000 members.
                </p>

                <div className="space-y-4">
                  <a 
                    href="https://chat.whatsapp.com/example" 
                    target="_blank"
                    rel="noreferrer"
                    className="w-full py-5 rounded-2xl bg-[#25D366] text-white font-bold text-xl flex items-center justify-center gap-3 hover:scale-[1.02] transition-transform"
                  >
                    <MessageCircle className="w-6 h-6" /> Join Public WhatsApp Group
                  </a>
                  <button 
                    onClick={() => setView('landing')}
                    className="w-full py-4 text-slate-400 font-medium hover:text-white transition-colors"
                  >
                    Back to Dashboard
                  </button>
                </div>
              </div>
            )}

            {view === 'members' && (
              <div className="w-full max-w-2xl">
                <header className="flex items-center justify-between mb-8">
                  <div>
                    <h2 className="text-3xl font-bold">Verified Members</h2>
                    <p className="text-slate-400">Total: {members.length} registered contacts</p>
                  </div>
                  <button onClick={() => setView('landing')} className="p-2 bg-white/5 rounded-full hover:bg-white/10">
                    <X className="w-6 h-6" />
                  </button>
                </header>

                <div className="bg-white/5 border border-white/10 rounded-3xl overflow-hidden backdrop-blur-md">
                  <div className="max-h-[600px] overflow-y-auto custom-scrollbar">
                    {members.length === 0 ? (
                      <div className="p-20 text-center text-slate-500">
                        <Users className="w-12 h-12 mx-auto mb-4 opacity-20" />
                        <p>No members registered yet. Be the first!</p>
                      </div>
                    ) : (
                      <table className="w-full border-collapse">
                        <thead className="sticky top-0 bg-slate-900/90 backdrop-blur-md z-20 border-b border-white/5">
                          <tr>
                            <th className="px-6 py-4 text-left text-xs uppercase tracking-widest text-slate-500 font-bold">Name</th>
                            <th className="px-6 py-4 text-left text-xs uppercase tracking-widest text-slate-500 font-bold">Phone (Masked)</th>
                            <th className="px-6 py-4 text-right text-xs uppercase tracking-widest text-slate-500 font-bold">Status</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-white/5">
                          {members.slice().sort((a,b) => b.timestamp - a.timestamp).map(member => (
                            <tr key={member.id} className="group hover:bg-white/5 transition-colors">
                              <td className="px-6 py-4">
                                <p className="font-bold text-slate-200">{member.name}</p>
                                <p className="text-[10px] text-slate-500 flex items-center gap-1">
                                  <MapPin className="w-2.5 h-2.5" /> {member.country || 'Global'}
                                </p>
                              </td>
                              <td className="px-6 py-4 font-mono text-sm text-slate-400">
                                {member.id.substring(0, 6)}XXXXXX
                              </td>
                              <td className="px-6 py-4 text-right">
                                <span className="px-2 py-1 rounded bg-green-500/10 text-green-500 text-[10px] font-bold uppercase border border-green-500/20">
                                  Verified
                                </span>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    )}
                  </div>
                </div>
              </div>
            )}
          </main>

          <footer className="relative z-10 py-12 border-t border-white/5 mt-auto">
            <div className="container mx-auto px-4 text-center">
              <p className="text-slate-500 text-sm mb-4">
                &copy; 2026 Beltah VCF Network. All rights reserved.
              </p>
              <div className="flex justify-center gap-6 text-xs font-bold text-slate-600 uppercase tracking-[0.2em]">
                <span className="hover:text-cyan-400 cursor-pointer transition-colors">Privacy</span>
                <span className="hover:text-cyan-400 cursor-pointer transition-colors">Terms</span>
                <span className="hover:text-cyan-400 cursor-pointer transition-colors">Safety</span>
              </div>
            </div>
          </footer>

          <style dangerouslySetInnerHTML={{ __html: `
            .custom-scrollbar::-webkit-scrollbar {
              width: 6px;
            }
            .custom-scrollbar::-webkit-scrollbar-track {
              background: transparent;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb {
              background: rgba(255, 255, 255, 0.1);
              border-radius: 10px;
            }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover {
              background: rgba(255, 255, 255, 0.2);
            }
          `}} />
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = createRoot(container);
    root.render(React.createElement(App));
  </script>
</body>
</html>
